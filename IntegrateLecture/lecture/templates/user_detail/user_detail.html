{% extends 'user_base.html' %}
{% load static %}

{% block title %}Edit User Profile{% endblock %}

{% block header %}
<header>
    <div class="inner">
        <div class="header-container">
            <div class="logo-container">
                <!-- 사이트 로고 -->
                <h1>
                    <a href="/main" class="logo">
                        <img src="{% static 'assets/logo2.png' %}" alt="로고"/>
                    </a>
                </h1>
            </div>
            <h2 class="page_title">마이페이지</h1>
            <div class="icon-container" id="iconContainer">
                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}?next={{ request.build_absolute_uri|urlencode }}">
                        {% csrf_token %}
                        <button type="submit" class="pretty_button logout">
                            <a>Logout</a>
                        </button>
                    </form>
                {% else %}
                    <button><a href="{% url 'login' %}">Login</a></button>
                    <button id="modal">Modal</button>
                    <div class="black-bg">
                        <div class="white-bg">
                            <h4>로그인하세요</h4>
                            <form action="success.html">
                                <div class="my-3">
                                    <input type="text" class="form-control" id="ID">
                                </div>
                                <div class="my-3">
                                    <input type="password" class="form-control" id="PW">
                                </div>
                                <button type="submit" class="btn btn-primary" id="send">전송</button>
                                <button type="button" class="btn btn-danger" id="close">닫기</button>
                            </form> 
                        </div>
                    </div>
                    <button><a href="{% url 'signup' %}">Signup</a></button>
                {% endif %}
            </div>
        </div>
    </div>
</header>
{% endblock %}



{% block content %}
<div class="row btn_row">
    <div class="col-sm-6 d-flex justify-content-start">
        <a class="btn btn-info" href="{% url 'user_update' pk=user.pk %}">찜 삭제</a>
    </div>
    <div class="col-sm-6 d-flex justify-content-end">
        <form method="post" action="{% url 'user_delete' pk=user.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger delete-btn">회원탈퇴</button>
        </form>
    </div>
</div>
{% endblock %}
